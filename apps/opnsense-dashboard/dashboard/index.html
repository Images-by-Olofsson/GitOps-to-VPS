<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPNsense Security Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e4e4e7;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        
        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 24px;
            border: 1px solid rgba(139, 92, 246, 0.1);
        }
        
        h1 {
            color: #a78bfa;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #2d2a5f 100%);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        
        .stat-label {
            color: #9ca3af;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            color: #a78bfa;
            font-size: 36px;
            font-weight: 700;
        }
        
        .section {
            background: linear-gradient(135deg, #1e1b4b 0%, #2d2a5f 100%);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        
        .section-title {
            color: #a78bfa;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .alert-item {
            background: rgba(220, 38, 38, 0.1);
            border-left: 4px solid #dc2626;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 6px;
        }
        
        .alert-item.warning {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: #f59e0b;
        }
        
        .alert-item.info {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }
        
        .alert-time {
            color: #9ca3af;
            font-size: 12px;
        }
        
        .alert-message {
            color: #e4e4e7;
            margin-top: 4px;
        }
        
        .threat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .threat-item {
            background: rgba(139, 92, 246, 0.1);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }
        
        .threat-type {
            color: #a78bfa;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .threat-count {
            color: #e4e4e7;
            font-size: 24px;
            font-weight: 700;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .status-running {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        .status-stopped {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
        }
        
        .last-update {
            color: #9ca3af;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ OPNsense Security Dashboard</h1>
            <p class="subtitle">Real-time IDS/IPS Monitoring & Threat Intelligence</p>
            <div style="margin-top: 16px;">
                <button class="refresh-btn" onclick="loadData()">Refresh Data</button>
                <div class="last-update" id="lastUpdate">Loading...</div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">IDS/IPS Status</div>
                <div class="stat-value" id="idsStatus">
                    <span class="status-indicator status-stopped"></span>
                    Loading...
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Alerts (24h)</div>
                <div class="stat-value" id="alerts24h">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Blocked Threats</div>
                <div class="stat-value" id="blockedThreats">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Packet Rate</div>
                <div class="stat-value" id="packetRate">-</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Recent Security Alerts</div>
            <div id="recentAlerts">Loading alerts...</div>
        </div>

        <div class="section">
            <div class="section-title">Threat Statistics</div>
            <div class="threat-grid" id="threatStats">Loading threat data...</div>
        </div>

        <div class="section">
            <div class="section-title">Top Attack Sources</div>
            <div id="topSources">Loading source data...</div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = '/api';
        
        async function loadData() {
            try {
                const response = await fetch(API_ENDPOINT);
                const data = await response.json();
                
                // Update status
                const statusEl = document.getElementById('idsStatus');
                if (data.ids_running) {
                    statusEl.innerHTML = '<span class="status-indicator status-running"></span>Running';
                } else {
                    statusEl.innerHTML = '<span class="status-indicator status-stopped"></span>Stopped';
                }
                
                // Update stats
                document.getElementById('alerts24h').textContent = data.alerts_24h || 0;
                document.getElementById('blockedThreats').textContent = data.blocked_threats || 0;
                document.getElementById('packetRate').textContent = (data.packet_rate || 0) + '/s';
                
                // Update alerts
                const alertsHtml = data.recent_alerts && data.recent_alerts.length > 0
                    ? data.recent_alerts.map(alert => `
                        <div class="alert-item ${alert.severity || 'warning'}">
                            <div class="alert-time">${new Date(alert.timestamp * 1000).toLocaleString()}</div>
                            <div class="alert-message">${alert.message}</div>
                        </div>
                    `).join('')
                    : '<p style="color: #9ca3af;">No recent alerts</p>';
                document.getElementById('recentAlerts').innerHTML = alertsHtml;
                
                // Update threat stats
                const threats = data.threats || {};
                const threatHtml = Object.entries(threats).map(([type, count]) => `
                    <div class="threat-item">
                        <div class="threat-type">${type.toUpperCase()}</div>
                        <div class="threat-count">${count}</div>
                    </div>
                `).join('');
                document.getElementById('threatStats').innerHTML = threatHtml || '<p style="color: #9ca3af;">No threat data</p>';
                
                // Update top sources
                const sourcesHtml = data.top_sources && data.top_sources.length > 0
                    ? data.top_sources.map(src => `
                        <div class="alert-item info">
                            <div class="alert-message">${src.ip} - ${src.count} attacks</div>
                        </div>
                    `).join('')
                    : '<p style="color: #9ca3af;">No source data</p>';
                document.getElementById('topSources').innerHTML = sourcesHtml;
                
                // Update timestamp
                document.getElementById('lastUpdate').textContent = 'Last updated: ' + new Date().toLocaleString();
                
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('lastUpdate').textContent = 'Error loading data - ' + error.message;
            }
        }
        
        // Load data on page load
        loadData();
        
        // Auto-refresh every 10 seconds
        setInterval(loadData, 10000);
    </script>
</body>
</html>
