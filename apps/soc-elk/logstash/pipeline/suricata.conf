input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  # Parse Suricata EVE JSON
  mutate { add_tag => ["suricata_filter_applied"] }
  
  if [agent][type] == "filebeat" or [event_type] {
    # Suricata data is already partially flat or at root depending on Filebeat version
    # If the message is still JSON, parse it
    if [message] =~ /^\{/ {
      json {
        source => "message"
      }
    }

    # Extract timestamp from the root if it exists
    if [timestamp] {
      date {
        match => [ "timestamp", "ISO8601" ]
        target => "@timestamp"
      }
    }

    # GeoIP enrichment for source IP
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "geoip"
        database => "/usr/share/logstash/geoip/GeoLite2-City.mmdb"
        # We'll let it use default ECS mapping if it wants, but rename later to match dashboard
      }
    }

    # Add severity level from alert object
    if [alert][severity] {
      mutate {
        add_field => { "severity_level" => "%{[alert][severity]}" }
      }
    }

    # Normalize fields for easier querying (match dashboard original design)
    mutate {
      rename => {
        "src_ip" => "source_ip"
        "dest_ip" => "destination_ip"
        "src_port" => "source_port"
        "dest_port" => "destination_port"
        "proto" => "protocol"
        "[alert][signature]" => "alert_signature"
        "[alert][category]" => "alert_category"
      }
    }
    
    # Also ensure GeoIP fields are accessible where the dashboard expects them
    if [geoip][geo][country_name] {
      mutate {
        copy => { "[geoip][geo][country_name]" => "country_name" }
        copy => { "[geoip][geo][location]" => "location" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "suricata-%{+YYYY.MM.dd}"
    manage_template => true
    template_name => "suricata"
    template_overwrite => true
  }

  # Debug output (comment out in production)
  # stdout { codec => rubydebug }
}
