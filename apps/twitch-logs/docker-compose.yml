services:
  nginx:
    image: nginx:alpine
    container_name: twitch-logs-nginx
    restart: unless-stopped
    volumes:
      - ./www:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    networks:
      - traefik_traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.twitch-logs.rule=Host(`twitch-logs.townhouseagent.org`)"
      - "traefik.http.routers.twitch-logs.entrypoints=websecure"
      - "traefik.http.routers.twitch-logs.tls.certresolver=letsencrypt"
      - "traefik.docker.network=traefik_traefik-network"
      - "traefik.http.routers.twitch-logs.middlewares=authelia@docker,cloudflare-headers@file,twitch-logs-strip-xfo"
      - "traefik.http.middlewares.twitch-logs-strip-xfo.headers.customresponseheaders.X-Frame-Options="
      - "traefik.http.services.twitch-logs.loadbalancer.server.port=80"

  log-updater:
    image: docker:cli
    container_name: twitch-log-updater
    restart: unless-stopped
    command: sh -c "while true; do docker logs --tail 150 twitch-miner > /www/logs.txt 2>&1; sleep 5; done"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./www:/www
    networks:
      - traefik_traefik-network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  stats-updater:
    image: alpine:latest
    container_name: twitch-stats-updater
    restart: unless-stopped
    command: >
      sh -c 'apk add --no-cache bc jq && while true; do
      sh /scripts/cumulative-stats.sh;
      sleep 30;
      done'
    volumes:
      - ../twitch-miner/logs:/logs:ro
      - ./www:/www
      - ./cumulative-stats.sh:/scripts/cumulative-stats.sh:ro
    networks:
      - traefik_traefik-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  irc-fetcher:
    image: python:3.11-alpine
    container_name: twitch-irc-fetcher
    restart: unless-stopped
    command: >
      sh -c 'pip install requests --quiet && python /scripts/irc-points-fetcher.py'
    volumes:
      - ../twitch-miner/logs:/logs:ro
      - ./www:/www
      - ./irc-points-fetcher.py:/scripts/irc-points-fetcher.py:ro
    networks:
      - traefik_traefik-network
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  grafana-updater:
    image: python:3.11-alpine
    container_name: twitch-grafana-updater
    restart: unless-stopped
    command: python /scripts/grafana-panel-updater.py
    environment:
      - GRAFANA_URL=http://grafana:3000
      - GF_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./www:/www:ro
      - ./grafana-panel-updater.py:/scripts/grafana-panel-updater.py:ro
    networks:
      - traefik_traefik-network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

networks:
  traefik_traefik-network:
    external: true
