services:
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SERVER_DOMAIN=grafana.townhouseagent.org
      - GF_SERVER_ROOT_URL=https://grafana.townhouseagent.org/
      - GF_SECURITY_DISABLE_SANITIZE_HTML=true
      - GF_PANELS_DISABLE_SANITIZE_HTML=true
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - traefik_traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.townhouseagent.org`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana.middlewares=authelia@docker,cloudflare-headers@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

volumes:
  grafana-storage:

networks:
  traefik_traefik-network:
    external: true
