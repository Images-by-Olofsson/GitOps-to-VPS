<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Status Dashboard | TownHouse</title>
    <meta name="description" content="Real-time infrastructure monitoring dashboard for TownHouse VPS services.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header id="dashboard-header">
            <div class="header-top">
                <div class="brand">
                    <div class="logo-icon">⚡</div>
                    <div>
                        <h1>System Status</h1>
                        <p class="subtitle">Infrastructure Health Monitor</p>
                    </div>
                </div>
                <div class="header-meta">
                    <div id="last-updated">Updated: <span id="timestamp">--</span></div>
                    <div id="overall-status" class="status-badge initializing">Initializing...</div>
                </div>
            </div>
        </header>

        <!-- Stats Summary Bar -->
        <section id="stats-bar" class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="stat-total">-</span>
                <span class="stat-label">Services</span>
            </div>
            <div class="stat-item stat-healthy">
                <span class="stat-value" id="stat-healthy">-</span>
                <span class="stat-label">Healthy</span>
            </div>
            <div class="stat-item stat-issues">
                <span class="stat-value" id="stat-issues">-</span>
                <span class="stat-label">Issues</span>
            </div>
            <div class="stat-item stat-certs">
                <span class="stat-value" id="stat-certs">-</span>
                <span class="stat-label">Certificates</span>
            </div>
        </section>

        <!-- Services Grid -->
        <section>
            <h2 class="section-title">Services</h2>
            <div id="services-grid" class="services-grid">
                <div class="loading">Loading service data...</div>
            </div>
        </section>

        <!-- Certificates -->
        <section id="certs-section" class="section-hidden">
            <h2 class="section-title">Certificate Status</h2>
            <div id="certs-grid" class="certs-grid"></div>
        </section>

        <!-- Deploy Timeline -->
        <section id="deploys-section" class="section-hidden">
            <h2 class="section-title">Recent Deployments</h2>
            <div id="deploy-timeline" class="deploy-timeline"></div>
        </section>
    </div>

    <script src="app.js?v=20260314_0415"></script>
</body>
</html>
